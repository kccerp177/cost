<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>물량 산출기 — Tablet (Galaxy Tab)</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
  * { box-sizing: border-box; }
  html, body { background: #0A0E1A; min-height: 100%; margin: 0; font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: auto; }
  .stage::before { content: ''; position: fixed; top: -10%; left: -5%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 65%); pointer-events: none; z-index: 0; }
  .stage::after { content: ''; position: fixed; bottom: -10%; right: -5%; width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 65%); pointer-events: none; z-index: 0; }
  .device-wrap { position: relative; z-index: 1; }
  .back-link { position: fixed; top: 24px; left: 24px; z-index: 10; display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #B8C4E0; font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif; font-size: 12.5px; font-weight: 600; text-decoration: none; letter-spacing: -0.1px; transition: all .2s; backdrop-filter: blur(10px); }
  .back-link:hover { background: rgba(255,255,255,0.08); border-color: rgba(6,182,212,0.4); color: #E6E8EE; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
</style>
</head>
<body>
<a href="../" class="back-link">
  <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
    <path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  디바이스 선택
</a>
<div id="root"></div>

<script type="text/babel" src="../phone/js/design-tokens.jsx?v=2"></script>
<script type="text/babel" src="./js/tablet-frame.jsx?v=2"></script>
<script type="text/babel" src="../phone/js/icons.jsx?v=2"></script>
<script type="text/babel" src="../phone/js/qc-data.jsx?v=6"></script>
<script type="text/babel" src="../phone/js/qc-logic.jsx?v=6"></script>
<script type="text/babel" src="../phone/js/qc-floorplan.jsx?v=3"></script>
<script type="text/babel" src="../phone/js/screen-mode.jsx?v=2"></script>
<script type="text/babel" src="../phone/js/qc-simple-data.jsx?v=2"></script>
<script type="text/babel" src="../phone/js/screen-simple.jsx?v=4"></script>
<script type="text/babel" src="./js/tablet-shell.jsx?v=5"></script>
<script type="text/babel" src="./js/tab-sites.jsx?v=5"></script>
<script type="text/babel" src="./js/tab-upload.jsx?v=3"></script>
<script type="text/babel" src="./js/tab-convert.jsx?v=2"></script>
<script type="text/babel" src="./js/tab-review.jsx?v=6"></script>
<script type="text/babel" src="./js/tab-confirm.jsx?v=4"></script>
<script type="text/babel" src="./js/tab-search.jsx?v=2"></script>
<script type="text/babel" src="./js/tab-settings.jsx?v=2"></script>

<script type="text/babel" data-presets="react">

// ─── 태블릿 전용 모드 선택 화면 ────────────────────────────
function TabletModeSelect({ onSelect }) {
  const T = window.TOKENS;
  const cards = [
    {
      key: 'floorplan',
      title: '도면변환 계산',
      desc: '이미지를 도면으로 변환해 공간별 자동 산출',
      accent: T.brand.primary,
      accentSoft: T.brand.primarySoft,
      preview: <FloorplanPreview/>,
      recommended: true,
    },
    {
      key: 'simple',
      title: '단순계산',
      desc: '치수만 입력해 빠르게 자재량 산출',
      accent: T.brand.accent,
      accentSoft: T.brand.accentSoft,
      preview: <SimplePreview/>,
      recommended: false,
    },
  ];

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: T.bg, padding: 48,
    }}>
      <div style={{ marginBottom: 36, textAlign: 'center' }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.brand.primary, letterSpacing: 1.5, marginBottom: 10 }}>
          AI 물량 산출기
        </div>
        <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: -0.8 }}>어떻게 계산할까요?</div>
      </div>

      <div style={{ display: 'flex', gap: 20, width: '100%', maxWidth: 820 }}>
        {cards.map(c => (
          <button key={c.key} onClick={() => onSelect(c.key)} style={{
            flex: 1, padding: 0, borderRadius: 18, overflow: 'hidden',
            background: '#fff', border: `1.5px solid ${c.accent}55`,
            cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
            boxShadow: `0 4px 14px ${c.accent}1a`,
            transition: 'all .15s', position: 'relative',
            display: 'flex', flexDirection: 'column',
          }}
          onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-3px)'; e.currentTarget.style.boxShadow = `0 10px 26px ${c.accent}2e`; }}
          onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = `0 4px 14px ${c.accent}1a`; }}>
            {c.recommended && (
              <span style={{
                position: 'absolute', top: 14, right: 14, zIndex: 5,
                fontSize: 11, fontWeight: 700, letterSpacing: 0.3,
                color: '#fff', background: c.accent,
                padding: '3px 11px', borderRadius: 999,
              }}>추천</span>
            )}
            <div style={{
              height: 180, background: c.accentSoft,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              overflow: 'hidden',
            }}>
              {c.preview}
            </div>
            <div style={{ padding: '18px 20px 22px' }}>
              <div style={{ fontSize: 19, fontWeight: 700, letterSpacing: -0.3, marginBottom: 5 }}>{c.title}</div>
              <div style={{ fontSize: 13.5, color: T.ink3, lineHeight: 1.5 }}>{c.desc}</div>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── localStorage 로스율 초기화 ────────────────────────────
function initLossRates() {
  const defaults = Object.fromEntries(
    Object.entries(QC_MATERIAL_SPECS).map(([k, v]) => [k, Math.round(v.lossRate * 100)])
  );
  try {
    const saved = localStorage.getItem('qc_loss_rates');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.entries(parsed).forEach(([k, r]) => {
        if (QC_MATERIAL_SPECS[k]) QC_MATERIAL_SPECS[k].lossRate = r / 100;
      });
      return { ...defaults, ...parsed };
    }
  } catch (e) {}
  return defaults;
}

// ─── 태블릿 앱 ────────────────────────────────────────────
function TabletApp() {
  const T = window.TOKENS;
  const [tab, setTab]     = React.useState('mode');
  const [step, setStep]   = React.useState(1);
  const [state, setState] = React.useState(qcCreateInitialState());
  const [activeSite, setActiveSite] = React.useState(null);
  const [selectedRoomId, setSelectedRoomId] = React.useState(null);
  const [toast, setToast] = React.useState('');
  const [settingsLossRates, setSettingsLossRates] = React.useState(initLossRates);
  const [confirmed, setConfirmed] = React.useState(false);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2200); };

  const handleModeSelect = (mode) => {
    if (mode === 'floorplan') setTab('sites');
    else setTab('simple');
  };

  const handleSiteSelect = (site) => {
    setActiveSite(site);
    if (site.hasQuantity)      { setStep(4); setTab('confirm'); setConfirmed(true); }
    else if (site.hasDrawing)  { setStep(3); setTab('review'); }
    else                       { setStep(1); setTab('upload'); }  // 신규 → 업로드
  };
  const handleUploaded   = () => { setStep(2); setTab('convert'); };
  const handleConverted  = () => { setStep(3); setTab('review'); };
  const handleReviewDone = () => { setStep(4); setTab('confirm'); setConfirmed(true); };

  const updateState = (fn) => setState(prev => ({ ...prev, ...fn(prev) }));
  const toggleExpansion = (k, v) => updateState(s => ({ expansionState: { ...s.expansionState, [k]: v } }));
  const updateDim = (roomId, wMm, hMm) => updateState(s => ({ dimOverrides: { ...s.dimOverrides, [roomId]: { wMm, hMm } } }));
  const updateRoomMat = (roomId, matKey, qty) => updateState(s => ({
    roomMatOverrides: { ...s.roomMatOverrides, [roomId]: { ...(s.roomMatOverrides[roomId] || {}), [matKey]: qty } }
  }));
  const updateMat  = (matKey, qty) => updateState(s => ({ matOverrides: { ...s.matOverrides, [matKey]: qty } }));
  const updateWall = (roomId, wallKey, data) => updateState(s => ({
    wallOverrides: { ...s.wallOverrides, [roomId]: { ...(s.wallOverrides[roomId] || {}), [wallKey]: data } }
  }));
  const updateFloor = (roomId, floorKey) => updateState(s => ({
    floorOverrides: { ...(s.floorOverrides || {}), [roomId]: floorKey }
  }));
  // 공간 포함/제외 토글 (force=true/false로 강제 설정, 없으면 현재 상태 반전)
  const toggleRoomEnabled = (roomId, force) => updateState(s => {
    const cur = (s.roomEnabled || {})[roomId] !== false;
    const next = force !== undefined ? force : !cur;
    return { roomEnabled: { ...(s.roomEnabled || {}), [roomId]: next } };
  });

  const handleSave = () => { showToast('물량이 현장에 저장되었습니다'); setTab('sites'); setStep(1); };
  const handleSettingsSave = (rates) => setSettingsLossRates(rates);

  const handleTabChange = (newTab) => {
    const isLocked = !activeSite && step <= 1;
    if (isLocked && newTab === 'review') {
      showToast('현장을 선택하거나 도면을 먼저 업로드해주세요');
      return;
    }
    if (newTab === 'confirm' && !confirmed) {
      showToast('도면 확인에서 물량 확정하기를 먼저 눌러주세요');
      return;
    }
    // 현장 탭으로 이동 시 전체 초기화
    if (newTab === 'sites') {
      setState(qcCreateInitialState());
      setActiveSite(null);
      setSelectedRoomId(null);
      setStep(1);
      setConfirmed(false);
    }
    setTab(newTab);
    if (newTab === 'review')  setStep(3);
    if (newTab === 'confirm') setStep(4);
  };

  const isFullScreen = tab === 'mode' || tab === 'simple';

  return (
    <div className="stage">
      <InstallGlobalStyles/>
      <div className="device-wrap">
        <TabletDevice width={1200} height={820}>
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
            <TabletTopBar
              activeSite={activeSite}
              onConfirm={handleReviewDone}
              showConfirm={tab === 'review'}
            />
            <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
              {!isFullScreen && <TabletSideBar tab={tab} onChange={handleTabChange} step={step} activeSite={activeSite} confirmed={confirmed}/>}
              <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
                {tab === 'mode'    && <TabletModeSelect onSelect={handleModeSelect}/>}
                {tab === 'simple'  && (
                  <div style={{
                    flex: 1, display: 'flex', justifyContent: 'center',
                    overflow: 'auto', background: T.bg, padding: '0 20px',
                  }}>
                    <div style={{ width: '100%', maxWidth: 500, display: 'flex', flexDirection: 'column' }}>
                      <SimpleScreen onBackToMode={() => setTab('mode')}/>
                    </div>
                  </div>
                )}
                {tab === 'sites'   && <TabSites sites={QC_SITES} onSelect={handleSiteSelect} onNew={() => { setActiveSite(null); setTab('upload'); setStep(1); }}/>}
                {tab === 'upload'  && <TabUpload activeSite={activeSite} sites={QC_SITES} onUploaded={handleUploaded} onPickSite={handleSiteSelect} onBack={() => handleTabChange('sites')}/>}
                {tab === 'convert' && <TabConvert activeSite={activeSite} onDone={handleConverted}/>}
                {tab === 'review'  && <TabReview state={state} activeSite={activeSite}
                  selectedRoomId={selectedRoomId} onSelectRoom={setSelectedRoomId}
                  onToggleExpansion={toggleExpansion} onUpdateDim={updateDim}
                  onUpdateRoomMat={updateRoomMat} onUpdateWall={updateWall}
                  onUpdateFloor={updateFloor} onToggleRoom={toggleRoomEnabled}
                  onConfirm={handleReviewDone}/>}
                {tab === 'confirm'  && <TabConfirm state={state} activeSite={activeSite} sites={QC_SITES}
                  onSave={handleSave}/>}
                {tab === 'search'   && <TabSearch query={globalQuery} setQuery={setGlobalQuery}
                  sites={QC_SITES} onSiteSelect={handleSiteSelect}/>}
                {tab === 'settings' && <TabSettings lossRates={settingsLossRates} onSave={handleSettingsSave}/>}
              </div>
            </div>
          </div>

          {toast && (
            <div style={{
              position: 'absolute', left: '50%', bottom: 40, transform: 'translateX(-50%)',
              background: 'rgba(14,17,22,0.92)', color: '#fff',
              padding: '12px 22px', borderRadius: 999,
              fontSize: 13, fontWeight: 500, letterSpacing: -0.2,
              zIndex: 100, animation: 'qc-slide-up .22s ease-out',
            }}>{toast}</div>
          )}
        </TabletDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TabletApp/>);
</script>
</body>
</html>
