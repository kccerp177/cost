<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>물량 산출기 — Phone (Galaxy)</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
  * { box-sizing: border-box; }
  html, body { background: #0A0E1A; min-height: 100%; margin: 0; font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: auto; }
  .stage::before { content: ''; position: fixed; top: -10%; left: -5%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 65%); pointer-events: none; z-index: 0; }
  .stage::after { content: ''; position: fixed; bottom: -10%; right: -5%; width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 65%); pointer-events: none; z-index: 0; }
  .device-wrap { position: relative; z-index: 1; }
  .back-link { position: fixed; top: 24px; left: 24px; z-index: 10; display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #B8C4E0; font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif; font-size: 12.5px; font-weight: 600; text-decoration: none; letter-spacing: -0.1px; transition: all .2s; backdrop-filter: blur(10px); }
  .back-link:hover { background: rgba(255,255,255,0.08); border-color: rgba(6,182,212,0.4); color: #E6E8EE; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
</style>
</head>
<body>
<a href="../" class="back-link">
  <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
    <path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  디바이스 선택
</a>
<div id="root"></div>

<script type="text/babel" src="./js/design-tokens.jsx"></script>
<script type="text/babel" src="./js/galaxy-frame.jsx"></script>
<script type="text/babel" src="./js/icons.jsx"></script>
<script type="text/babel" src="./js/qc-data.jsx"></script>
<script type="text/babel" src="./js/qc-logic.jsx"></script>
<script type="text/babel" src="./js/qc-floorplan.jsx"></script>
<script type="text/babel" src="./js/screen-sites.jsx"></script>
<script type="text/babel" src="./js/screen-upload.jsx"></script>
<script type="text/babel" src="./js/screen-convert.jsx"></script>
<script type="text/babel" src="./js/screen-review.jsx"></script>
<script type="text/babel" src="./js/screen-confirm.jsx"></script>
<script type="text/babel" src="./js/screen-search.jsx"></script>
<script type="text/babel" src="./js/screen-mode.jsx"></script>
<script type="text/babel" src="./js/qc-simple-data.jsx"></script>
<script type="text/babel" src="./js/screen-simple.jsx"></script>

<script type="text/babel" data-presets="react">
function QcApp() {
  const [tab, setTab]     = React.useState('mode');      // mode|sites|upload|convert|review|confirm|search
  const [step, setStep]   = React.useState(1);           // 1:upload 2:convert 3:review 4:confirm
  const [state, setState] = React.useState(qcCreateInitialState());
  const [activeSite, setActiveSite] = React.useState(null); // { id, name, ... } | null
  const [selectedRoomId, setSelectedRoomId] = React.useState(null);
  const [globalQuery, setGlobalQuery] = React.useState('');
  const [toast, setToast] = React.useState('');

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 2200);
  };

  // 모드 선택
  const handleModeSelect = (mode) => {
    if (mode === 'floorplan') {
      setTab('sites');
    } else if (mode === 'simple') {
      setTab('simple');
    }
  };

  // 현장 선택 시 라우팅
  const handleSiteSelect = (site) => {
    setActiveSite(site);
    if (site.hasQuantity) {
      setStep(4); setTab('confirm');
    } else if (site.hasDrawing) {
      setStep(3); setTab('review');
    } else {
      setStep(1); setTab('upload');
    }
  };

  // 업로드 시뮬레이션 → 변환 → 리뷰
  const handleUploaded = () => {
    setStep(2); setTab('convert');
  };
  const handleConverted = () => {
    setStep(3); setTab('review');
  };
  const handleReviewConfirm = () => {
    setStep(4); setTab('confirm');
  };

  // state mutator
  const updateState = (fn) => setState(prev => {
    const next = { ...prev, ...fn(prev) };
    return next;
  });
  const toggleExpansion = (key, val) => updateState(s => ({ expansionState: { ...s.expansionState, [key]: val } }));
  const updateDim = (roomId, wMm, hMm) => updateState(s => ({ dimOverrides: { ...s.dimOverrides, [roomId]: { wMm, hMm } } }));
  const updateRoomMat = (roomId, matKey, qty) => updateState(s => ({
    roomMatOverrides: { ...s.roomMatOverrides, [roomId]: { ...(s.roomMatOverrides[roomId] || {}), [matKey]: qty } }
  }));
  const updateMat = (matKey, qty) => updateState(s => ({ matOverrides: { ...s.matOverrides, [matKey]: qty } }));
  const updateFinish = (key, val) => updateState(s => ({ finishOverrides: { ...s.finishOverrides, [key]: val } }));

  // 현장 저장
  const handleSave = (siteInfo) => {
    // siteInfo가 null이면 현장선택/등록 모달에서 받아온 것
    showToast('물량이 현장에 저장되었습니다');
    setTab('sites');
    setStep(1);
  };

  // 탭 변경 (진행 중 상태 유지)
  const handleTabChange = (newTab) => {
    setTab(newTab);
    if (newTab === 'upload')  setStep(1);
    if (newTab === 'convert') setStep(2);
    if (newTab === 'review')  setStep(3);
    if (newTab === 'confirm') setStep(4);
  };

  return (
    <div className="stage">
      <InstallGlobalStyles/>
      <div className="device-wrap">
        <GalaxyDevice width={402} height={874}>
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column', paddingTop: 44 }}>
            <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
              {tab === 'mode' && (
                <ModeSelectScreen onSelect={handleModeSelect}/>
              )}
              {tab === 'simple' && (
                <SimpleScreen onBackToMode={() => setTab('mode')}/>
              )}
              {tab === 'sites' && (
                <SitesScreen
                  sites={QC_SITES}
                  onSelect={handleSiteSelect}
                  onNew={() => { setActiveSite(null); setTab('upload'); setStep(1); }}
                  onBackToMode={() => { setActiveSite(null); setSelectedRoomId(null); setStep(1); setTab('mode'); }}
                />
              )}
              {tab === 'upload' && (
                <UploadScreen
                  activeSite={activeSite}
                  sites={QC_SITES}
                  onUploaded={handleUploaded}
                  onPickSite={handleSiteSelect}
                />
              )}
              {tab === 'convert' && (
                <ConvertScreen
                  activeSite={activeSite}
                  onDone={handleConverted}
                />
              )}
              {tab === 'review' && (
                <ReviewScreen
                  state={state}
                  activeSite={activeSite}
                  selectedRoomId={selectedRoomId}
                  onSelectRoom={setSelectedRoomId}
                  onToggleExpansion={toggleExpansion}
                  onUpdateDim={updateDim}
                  onUpdateRoomMat={updateRoomMat}
                  onConfirm={handleReviewConfirm}
                />
              )}
              {tab === 'confirm' && (
                <ConfirmScreen
                  state={state}
                  activeSite={activeSite}
                  sites={QC_SITES}
                  onUpdateMat={updateMat}
                  onUpdateFinish={updateFinish}
                  onSave={handleSave}
                />
              )}
              {tab === 'search' && (
                <SearchScreen
                  query={globalQuery}
                  setQuery={setGlobalQuery}
                  sites={QC_SITES}
                  onSiteSelect={handleSiteSelect}
                />
              )}
            </div>
            {tab !== 'mode' && tab !== 'simple' && <PhoneTabBar tab={tab} onChange={handleTabChange}/>}
          </div>

          {toast && (
            <div style={{
              position: 'absolute', left: '50%', bottom: 90, transform: 'translateX(-50%)',
              background: 'rgba(14,17,22,0.92)', color: '#fff',
              padding: '10px 18px', borderRadius: 999,
              fontSize: 12.5, fontWeight: 500, letterSpacing: -0.2,
              zIndex: 100, animation: 'qc-slide-up .22s ease-out',
            }}>{toast}</div>
          )}
        </GalaxyDevice>
      </div>
    </div>
  );
}

// ─── 하단 탭바 (5개) ─────────────────────────────────────
function PhoneTabBar({ tab, onChange }) {
  const T = window.TOKENS;
  const items = [
    { key: 'sites',   label: '현장',     icon: 'building' },
    { key: 'upload',  label: '업로드',   icon: 'upload' },
    { key: 'convert', label: '도면변환', icon: 'sparkles' },
    { key: 'confirm', label: '물량확정', icon: 'box' },
    { key: 'search',  label: '검색',     icon: 'search' },
  ];
  return (
    <div style={{
      height: 68, padding: '6px 4px 12px',
      background: '#fff', borderTop: `1px solid ${T.lineSoft}`,
      display: 'flex', alignItems: 'center', justifyContent: 'space-around',
    }}>
      {items.map(it => {
        const active = tab === it.key || (it.key === 'confirm' && tab === 'review');
        const color = active ? T.brand.primary : T.ink4;
        return (
          <button key={it.key} onClick={() => onChange(it.key)} style={{
            flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
            background: 'transparent', border: 'none', padding: '4px 0',
            fontFamily: 'inherit', cursor: 'pointer',
          }}>
            <Icon name={it.icon} size={20} color={color} strokeWidth={active ? 2.2 : 1.8}/>
            <span style={{ fontSize: 10.5, fontWeight: active ? 700 : 500, color, letterSpacing: -0.2 }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

window.PhoneTabBar = PhoneTabBar;

ReactDOM.createRoot(document.getElementById('root')).render(<QcApp/>);
</script>

</body>
</html>
