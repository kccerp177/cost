<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>물량 산출기 — Phone (Galaxy)</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
  * { box-sizing: border-box; }
  html, body { background: #0A0E1A; min-height: 100%; margin: 0; font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: auto; }
  .stage::before { content: ''; position: fixed; top: -10%; left: -5%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 65%); pointer-events: none; z-index: 0; }
  .stage::after { content: ''; position: fixed; bottom: -10%; right: -5%; width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 65%); pointer-events: none; z-index: 0; }
  .device-wrap { position: relative; z-index: 1; }
  .back-link { position: fixed; top: 24px; left: 24px; z-index: 10; display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #B8C4E0; font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif; font-size: 12.5px; font-weight: 600; text-decoration: none; letter-spacing: -0.1px; transition: all .2s; backdrop-filter: blur(10px); }
  .back-link:hover { background: rgba(255,255,255,0.08); border-color: rgba(6,182,212,0.4); color: #E6E8EE; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
</style>
</head>
<body>
<a href="../" class="back-link">
  <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
    <path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  디바이스 선택
</a>
<div id="root"></div>

<script type="text/babel" src="./js/design-tokens.jsx?v=3"></script>
<script type="text/babel" src="./js/galaxy-frame.jsx?v=3"></script>
<script type="text/babel" src="./js/icons.jsx?v=3"></script>
<script type="text/babel" src="./js/qc-data.jsx?v=6"></script>
<script type="text/babel" src="./js/qc-logic.jsx?v=6"></script>
<script type="text/babel" src="./js/qc-floorplan.jsx?v=3"></script>
<script type="text/babel" src="./js/screen-sites.jsx?v=7"></script>
<script type="text/babel" src="./js/screen-upload.jsx?v=4"></script>
<script type="text/babel" src="./js/screen-convert.jsx?v=3"></script>
<script type="text/babel" src="./js/screen-review.jsx?v=8"></script>
<script type="text/babel" src="./js/screen-confirm.jsx?v=5"></script>
<script type="text/babel" src="./js/screen-search.jsx?v=3"></script>
<script type="text/babel" src="./js/screen-mode.jsx?v=3"></script>
<script type="text/babel" src="./js/qc-simple-data.jsx?v=3"></script>
<script type="text/babel" src="./js/screen-simple.jsx?v=4"></script>
<script type="text/babel" src="./js/screen-settings.jsx?v=3"></script>

<script type="text/babel" data-presets="react">

// ─── localStorage 로스율 초기화 ────────────────────────────
function initLossRates() {
  const defaults = Object.fromEntries(
    Object.entries(QC_MATERIAL_SPECS).map(([k, v]) => [k, Math.round(v.lossRate * 100)])
  );
  try {
    const saved = localStorage.getItem('qc_loss_rates');
    if (saved) {
      const parsed = JSON.parse(saved);
      // 저장된 값을 QC_MATERIAL_SPECS에 즉시 반영
      Object.entries(parsed).forEach(([k, r]) => {
        if (QC_MATERIAL_SPECS[k]) QC_MATERIAL_SPECS[k].lossRate = r / 100;
      });
      return { ...defaults, ...parsed };
    }
  } catch (e) {}
  return defaults;
}

function QcApp() {
  const [tab, setTab]     = React.useState('mode');
  const [step, setStep]   = React.useState(1);
  const [state, setState] = React.useState(qcCreateInitialState());
  const [activeSite, setActiveSite] = React.useState(null);
  const [selectedRoomId, setSelectedRoomId] = React.useState(null);
  const [globalQuery, setGlobalQuery] = React.useState('');
  const [toast, setToast] = React.useState('');
  const [settingsLossRates, setSettingsLossRates] = React.useState(initLossRates);
  const [confirmed, setConfirmed] = React.useState(false); // 물량 확정하기 누른 후 true

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2200); };

  const handleModeSelect = (mode) => {
    if (mode === 'floorplan') setTab('sites');
    else setTab('simple');
  };

  const handleSiteSelect = (site) => {
    setActiveSite(site);
    if (site.hasQuantity)      { setStep(4); setTab('confirm'); setConfirmed(true); }
    else if (site.hasDrawing)  { setStep(3); setTab('review'); }
    else                       { setStep(1); setTab('upload'); }  // 신규 → 업로드 화면
  };

  const handleUploaded       = () => { setStep(2); setTab('convert'); };
  const handleConverted      = () => { setStep(3); setTab('review'); };
  const handleReviewConfirm  = () => { setStep(4); setTab('confirm'); setConfirmed(true); };

  const updateState    = (fn) => setState(prev => ({ ...prev, ...fn(prev) }));
  const toggleExpansion = (key, val) => updateState(s => ({ expansionState: { ...s.expansionState, [key]: val } }));
  const updateDim      = (roomId, wMm, hMm) => updateState(s => ({ dimOverrides: { ...s.dimOverrides, [roomId]: { wMm, hMm } } }));
  const updateRoomMat  = (roomId, matKey, qty) => updateState(s => ({
    roomMatOverrides: { ...s.roomMatOverrides, [roomId]: { ...(s.roomMatOverrides[roomId] || {}), [matKey]: qty } }
  }));
  const updateMat      = (matKey, qty) => updateState(s => ({ matOverrides: { ...s.matOverrides, [matKey]: qty } }));
  const updateWall     = (roomId, wallKey, data) => updateState(s => ({
    wallOverrides: { ...s.wallOverrides, [roomId]: { ...(s.wallOverrides[roomId] || {}), [wallKey]: data } }
  }));
  const updateFloor    = (roomId, floorKey) => updateState(s => ({
    floorOverrides: { ...(s.floorOverrides || {}), [roomId]: floorKey }
  }));
  // 공간 포함/제외 토글 (force=true/false로 강제 설정, 없으면 현재 상태 반전)
  const toggleRoomEnabled = (roomId, force) => updateState(s => {
    const cur = (s.roomEnabled || {})[roomId] !== false;
    const next = force !== undefined ? force : !cur;
    return { roomEnabled: { ...(s.roomEnabled || {}), [roomId]: next } };
  });

  const handleSave = () => { showToast('물량이 현장에 저장되었습니다'); setTab('sites'); setStep(1); };
  const handleSettingsSave = (rates) => setSettingsLossRates(rates);

  const handleTabChange = (newTab) => {
    const isLocked = !activeSite && step <= 1;
    if (isLocked && newTab === 'review') {
      showToast('현장을 선택하거나 도면을 먼저 업로드해주세요');
      return;
    }
    // 자재 확인 탭은 물량 확정하기 이후에만 접근 가능
    if (newTab === 'confirm' && !confirmed) {
      showToast('도면 확인에서 물량 확정하기를 먼저 눌러주세요');
      return;
    }
    // 현장 탭으로 돌아갈 때 전체 초기화
    if (newTab === 'sites') {
      setState(qcCreateInitialState());
      setActiveSite(null);
      setSelectedRoomId(null);
      setStep(1);
      setConfirmed(false);
    }
    setTab(newTab);
    if (newTab === 'review')  setStep(3);
    if (newTab === 'confirm') setStep(4);
  };

  return (
    <div className="stage">
      <InstallGlobalStyles/>
      <div className="device-wrap">
        <GalaxyDevice width={402} height={874}>
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column', paddingTop: 44 }}>
            <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
              {tab === 'mode' && <ModeSelectScreen onSelect={handleModeSelect}/>}
              {tab === 'simple' && <SimpleScreen onBackToMode={() => setTab('mode')}/>}
              {tab === 'sites' && (
                <SitesScreen
                  sites={QC_SITES}
                  onSelect={handleSiteSelect}
                  onNew={() => { setActiveSite(null); setTab('upload'); setStep(1); }}
                  onBackToMode={() => { setActiveSite(null); setSelectedRoomId(null); setStep(1); setTab('mode'); }}
                />
              )}
              {tab === 'upload' && (
                <UploadScreen
                  activeSite={activeSite} sites={QC_SITES}
                  onUploaded={handleUploaded} onPickSite={handleSiteSelect}
                  onBack={() => handleTabChange('sites')}
                />
              )}
              {tab === 'convert' && <ConvertScreen activeSite={activeSite} onDone={handleConverted}/>}
              {tab === 'review' && (
                <ReviewScreen
                  state={state} activeSite={activeSite}
                  selectedRoomId={selectedRoomId} onSelectRoom={setSelectedRoomId}
                  onToggleExpansion={toggleExpansion} onUpdateDim={updateDim}
                  onUpdateRoomMat={updateRoomMat} onUpdateWall={updateWall}
                  onUpdateFloor={updateFloor} onToggleRoom={toggleRoomEnabled}
                  onConfirm={handleReviewConfirm}
                />
              )}
              {tab === 'confirm' && (
                <ConfirmScreen
                  state={state} activeSite={activeSite} sites={QC_SITES}
                  onUpdateMat={updateMat} onSave={handleSave}
                />
              )}
              {tab === 'search' && (
                <SearchScreen query={globalQuery} setQuery={setGlobalQuery}
                  sites={QC_SITES} onSiteSelect={handleSiteSelect}/>
              )}
              {tab === 'settings' && (
                <SettingsScreen lossRates={settingsLossRates} onSave={handleSettingsSave}/>
              )}
            </div>
            {tab !== 'mode' && tab !== 'simple' && (
              <PhoneTabBar tab={tab} onChange={handleTabChange} activeSite={activeSite} step={step} confirmed={confirmed}/>
            )}
          </div>

          {toast && (
            <div style={{
              position: 'absolute', left: '50%', bottom: 90, transform: 'translateX(-50%)',
              background: 'rgba(14,17,22,0.92)', color: '#fff',
              padding: '10px 18px', borderRadius: 999,
              fontSize: 12.5, fontWeight: 500, letterSpacing: -0.2,
              zIndex: 100, animation: 'qc-slide-up .22s ease-out',
            }}>{toast}</div>
          )}
        </GalaxyDevice>
      </div>
    </div>
  );
}

// ─── 하단 탭바 (4개 — 업로드 탭 제거) ──────────────────────
function PhoneTabBar({ tab, onChange, activeSite, step, confirmed }) {
  const T = window.TOKENS;
  const items = [
    { key: 'sites',    label: '현장',      icon: 'building' },
    { key: 'review',   label: '도면 확인', icon: 'image'    },
    { key: 'confirm',  label: '자재 확인', icon: 'box'      },
    { key: 'settings', label: '설정',      icon: 'settings' },
  ];
  return (
    <div style={{
      height: 68, padding: '6px 4px 12px',
      background: '#fff', borderTop: `1px solid ${T.lineSoft}`,
      display: 'flex', alignItems: 'center', justifyContent: 'space-around',
    }}>
      {items.map(it => {
        const active = tab === it.key;
        // 도면 확인: 현장 미선택·미업로드 상태에서 잠금
        const reviewLocked  = it.key === 'review'  && (!activeSite && step <= 1);
        // 자재 확인: 물량 확정하기 버튼 누르기 전까지 잠금
        const confirmLocked = it.key === 'confirm' && !confirmed;
        const locked = reviewLocked || confirmLocked;
        const color  = active ? T.brand.primary : T.ink4;
        return (
          <button key={it.key} onClick={() => onChange(it.key)} style={{
            flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
            background: 'transparent', border: 'none', padding: '4px 0',
            fontFamily: 'inherit', cursor: locked ? 'default' : 'pointer',
            opacity: locked ? 0.28 : 1,
          }}>
            <Icon name={it.icon} size={20} color={color} strokeWidth={active ? 2.2 : 1.8}/>
            <span style={{ fontSize: 10.5, fontWeight: active ? 700 : 500, color, letterSpacing: -0.2 }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

window.PhoneTabBar = PhoneTabBar;

ReactDOM.createRoot(document.getElementById('root')).render(<QcApp/>);
</script>

</body>
</html>
